<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELECTROBOY 80 — Espace Membres</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Anton&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--pink:#FF006E;--yellow:#FFFF00;--blue:#00B4FF;--cyan:#00FFFF;--black:#000;--dark:#0a0a0a;--mid:#111;--panel:#141414;--border:#1e1e1e;--white:#F0F0F0;--muted:#666;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--white);font-family:'IBM Plex Mono',monospace;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent 0,transparent 3px,rgba(0,0,0,0.12) 3px,rgba(0,0,0,0.12) 4px);pointer-events:none;z-index:9999;}

/* AUTH SCREEN */
.auth-screen{position:fixed;inset:0;background:var(--black);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px;}
.auth-box{width:100%;max-width:420px;border:2px solid var(--yellow);padding:40px;}
.auth-logo{font-family:'Anton',sans-serif;font-size:36px;letter-spacing:-2px;margin-bottom:4px;}
.auth-logo span{color:var(--pink);}
.auth-sub{font-family:'VT323',monospace;font-size:16px;letter-spacing:4px;color:var(--muted);margin-bottom:30px;}
.auth-tabs{display:flex;gap:0;margin-bottom:24px;border:2px solid var(--border);}
.auth-tab{flex:1;padding:10px;text-align:center;font-family:'VT323',monospace;font-size:18px;letter-spacing:2px;cursor:pointer;transition:all 0.15s;color:var(--muted);border:none;background:transparent;}
.auth-tab.active{background:var(--yellow);color:var(--black);}
.form-group{margin-bottom:14px;}
.form-label{font-size:9px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:6px;}
.form-input,.form-select{width:100%;background:var(--mid);border:2px solid var(--border);color:var(--white);font-family:'IBM Plex Mono',monospace;font-size:13px;padding:10px 14px;outline:none;transition:border-color 0.15s;}
.form-input:focus,.form-select:focus{border-color:var(--yellow);}
.form-select option{background:var(--mid);}
.btn{font-family:'VT323',monospace;font-size:18px;letter-spacing:2px;padding:10px 24px;cursor:pointer;transition:all 0.15s;text-transform:uppercase;border:2px solid;width:100%;margin-top:8px;}
.btn-yellow{background:var(--yellow);border-color:var(--yellow);color:var(--black);}
.btn-yellow:hover{background:transparent;color:var(--yellow);}
.btn-pink{background:var(--pink);border-color:var(--pink);color:var(--black);}
.btn-pink:hover{background:transparent;color:var(--pink);}
.btn-ghost{background:transparent;border-color:var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:var(--white);color:var(--white);}
.btn-sm{font-size:14px;padding:6px 16px;width:auto;}

/* MAIN APP */
.app{display:none;}
.app.visible{display:block;}

/* TOPBAR */
.topbar{height:56px;background:var(--black);border-bottom:2px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 30px;position:sticky;top:0;z-index:100;}
.topbar-logo{font-family:'Anton',sans-serif;font-size:20px;letter-spacing:-1px;}
.topbar-logo span{color:var(--pink);}
.topbar-right{display:flex;align-items:center;gap:14px;}
.user-chip{display:flex;align-items:center;gap:8px;font-size:12px;}
.user-chip .avatar{width:30px;height:30px;background:var(--pink);display:flex;align-items:center;justify-content:center;font-family:'Anton',sans-serif;font-size:13px;color:var(--black);}
.role-tag{font-family:'VT323',monospace;font-size:13px;letter-spacing:2px;padding:2px 10px;text-transform:uppercase;}
.role-fan{background:rgba(255,0,110,0.15);color:var(--pink);border:1px solid var(--pink);}
.role-partner{background:rgba(0,180,255,0.15);color:var(--blue);border:1px solid var(--blue);}

/* NAV */
.bottom-nav{background:var(--black);border-top:2px solid var(--border);display:flex;padding:0;position:sticky;bottom:0;}
.nav-tab{flex:1;padding:14px 10px;text-align:center;cursor:pointer;transition:all 0.15s;border-top:3px solid transparent;}
.nav-tab.active{border-top-color:var(--yellow);}
.nav-tab .nav-icon{font-size:18px;display:block;margin-bottom:4px;}
.nav-tab .nav-label{font-family:'VT323',monospace;font-size:13px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.nav-tab.active .nav-label{color:var(--yellow);}

/* PAGES */
.page{display:none;padding:24px;min-height:calc(100vh - 112px);}
.page.active{display:block;}

/* CARDS */
.card{background:var(--panel);border:2px solid var(--border);margin-bottom:14px;overflow:hidden;}
.card-header{padding:14px 18px;border-bottom:2px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-body{padding:18px;}
.card-title{font-family:'VT323',monospace;font-size:18px;letter-spacing:2px;color:var(--yellow);}

/* BADGE */
.badge{display:inline-block;font-family:'VT323',monospace;font-size:13px;letter-spacing:2px;padding:2px 10px;}
.badge-pink{background:rgba(255,0,110,0.15);color:var(--pink);border:1px solid var(--pink);}
.badge-yellow{background:rgba(255,255,0,0.1);color:var(--yellow);border:1px solid var(--yellow);}
.badge-blue{background:rgba(0,180,255,0.1);color:var(--blue);border:1px solid var(--blue);}
.badge-green{background:rgba(0,255,136,0.1);color:#00ff88;border:1px solid #00ff88;}

/* EVENT CARD */
.event-card{border:2px solid var(--border);padding:18px;margin-bottom:12px;position:relative;overflow:hidden;transition:border-color 0.2s;}
.event-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}
.event-card.tonight::before{background:var(--yellow);animation:glow 1.5s ease-in-out infinite alternate;}
.event-card.upcoming::before{background:var(--pink);}
.event-card.tba::before{background:var(--muted);}
.event-card:hover{border-color:var(--pink);}
@keyframes glow{from{box-shadow:0 0 6px var(--yellow)}to{box-shadow:0 0 18px var(--yellow)}}
.event-date{font-family:'VT323',monospace;font-size:28px;color:var(--yellow);line-height:1;}
.event-name{font-family:'Anton',sans-serif;font-size:20px;margin:6px 0 2px;}
.event-meta{font-size:11px;color:var(--muted);letter-spacing:2px;}

/* FEED */
.post-card{border:2px solid var(--border);padding:18px;margin-bottom:12px;position:relative;}
.post-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.post-avatar{width:32px;height:32px;background:var(--pink);display:flex;align-items:center;justify-content:center;font-family:'Anton',sans-serif;font-size:14px;color:var(--black);}
.post-meta{font-size:10px;color:var(--muted);}
.post-body{font-size:13px;line-height:1.8;color:#bbb;margin-bottom:12px;}
.post-reactions{display:flex;gap:10px;}
.reaction-btn{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:4px 12px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:6px;}
.reaction-btn:hover{border-color:var(--pink);color:var(--pink);}
.reaction-btn.active{border-color:var(--pink);color:var(--pink);background:rgba(255,0,110,0.08);}

/* EXCLUSIVE CONTENT */
.exclusive-card{border:2px solid var(--yellow);padding:18px;margin-bottom:12px;position:relative;}
.exclusive-card::after{content:'★ EXCLUSIF';position:absolute;top:12px;right:12px;font-family:'VT323',monospace;font-size:13px;letter-spacing:2px;color:var(--yellow);}
.lock-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;}
.lock-overlay .lock-icon{font-size:32px;}
.lock-overlay .lock-text{font-family:'VT323',monospace;font-size:16px;letter-spacing:3px;color:var(--muted);}

/* PARTNER SPECIFIC */
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
.stat-row:last-child{border-bottom:none;}
.stat-key{font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;}
.stat-val{font-family:'VT323',monospace;font-size:22px;color:var(--yellow);}

/* PROGRESS */
.prog-bar{height:4px;background:var(--mid);margin-top:6px;}
.prog-fill{height:100%;background:var(--pink);}

/* PRESS KIT */
.kit-item{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);}
.kit-icon{font-size:24px;width:36px;text-align:center;flex-shrink:0;}
.kit-info{flex:1;}
.kit-name{font-size:13px;font-weight:700;}
.kit-size{font-size:10px;color:var(--muted);letter-spacing:2px;}

/* ALERT BELL */
.alert-toggle{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);}
.toggle-switch{width:48px;height:24px;background:var(--mid);border:2px solid var(--border);position:relative;cursor:pointer;transition:background 0.2s;}
.toggle-switch.on{background:var(--pink);border-color:var(--pink);}
.toggle-switch::after{content:'';position:absolute;width:16px;height:16px;background:var(--white);top:2px;left:2px;transition:left 0.2s;}
.toggle-switch.on::after{left:26px;}
.toggle-label{font-size:12px;letter-spacing:2px;}
.toggle-sub{font-size:10px;color:var(--muted);}

/* TOAST */
.toast-container{position:fixed;bottom:80px;right:20px;z-index:600;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--panel);border:2px solid;padding:10px 18px;font-family:'VT323',monospace;font-size:16px;letter-spacing:2px;animation:toastin 0.3s ease;display:flex;align-items:center;gap:8px;}
.toast.success{border-color:#00ff88;color:#00ff88;}
.toast.error{border-color:var(--pink);color:var(--pink);}
.toast.info{border-color:var(--blue);color:var(--blue);}
@keyframes toastin{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--black);}::-webkit-scrollbar-thumb{background:var(--border);}
</style>
</head>
<body>

<!-- AUTH -->
<div class="auth-screen" id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">ELECTRO<span>BOY</span>80</div>
    <div class="auth-sub">// ESPACE MEMBRES</div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login',this)">Connexion</button>
      <button class="auth-tab" onclick="switchAuthTab('register',this)">Inscription</button>
    </div>

    <div id="tab-login">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" id="login-email" type="email" placeholder="ton@email.com" value="fan@test.com">
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input class="form-input" id="login-pass" type="password" placeholder="••••••••" value="1234">
      </div>
      <button class="btn btn-yellow" onclick="doLogin()">▶ SE CONNECTER</button>
      <div style="margin-top:14px;font-family:'VT323',monospace;font-size:14px;color:var(--muted);letter-spacing:2px;text-align:center">
        Démo rapide :
        <span style="color:var(--pink);cursor:pointer" onclick="quickLogin('fan')">FAN</span> |
        <span style="color:var(--blue);cursor:pointer" onclick="quickLogin('partner')">PARTENAIRE</span>
      </div>
    </div>

    <div id="tab-register" style="display:none">
      <div class="form-group">
        <label class="form-label">Prénom / Pseudo</label>
        <input class="form-input" id="reg-name" placeholder="Ton nom">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" id="reg-email" type="email" placeholder="ton@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">Tu es...</label>
        <select class="form-select" id="reg-role">
          <option value="fan">Fan 🎸</option>
          <option value="partner">Partenaire 🤝</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input class="form-input" id="reg-pass" type="password" placeholder="••••••••">
      </div>
      <button class="btn btn-pink" onclick="doRegister()">▶ S'INSCRIRE</button>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-logo">ELECTRO<span>BOY</span>80</div>
    <div class="topbar-right">
      <div class="user-chip">
        <div class="avatar" id="user-avatar">F</div>
        <span id="user-name">Fan</span>
      </div>
      <span class="role-tag role-fan" id="role-tag">FAN</span>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">⏻</button>
    </div>
  </div>

  <!-- PAGES -->
  <div class="page active" id="p-home">
    <!-- Filled by JS -->
  </div>

  <div class="page" id="p-events">
    <div id="events-content"><!-- Filled by JS --></div>
  </div>

  <div class="page" id="p-exclusive">
    <div id="exclusive-content"><!-- Filled by JS --></div>
  </div>

  <div class="page" id="p-partner">
    <div id="partner-content"><!-- Filled by JS --></div>
  </div>

  <div class="page" id="p-account">
    <div id="account-content"><!-- Filled by JS --></div>
  </div>

  <!-- BOTTOM NAV (filled by JS) -->
  <div class="bottom-nav" id="bottom-nav"></div>

</div>

<!-- TOASTS -->
<div class="toast-container" id="toast-container"></div>

<script>
// ============ STATE ============
let currentUser = null;
let currentPage = 'home';

const DEMO_USERS = {
  fan: {name:'Marie D.',email:'fan@test.com',role:'fan',avatar:'M',joined:'2026-01-15',alerts:['concerts','news'],subs:['exclusive']},
  partner: {name:'La Grosse Radio',email:'partner@test.com',role:'partner',avatar:'R',joined:'2025-12-01',type:'Média',access:'press'},
};

const EVENTS = [
  {id:1,name:"Brasserie du Pilat",date:"2026-04-18",time:"21h00",venue:"Brasserie du Pilat",city:"St Julien Molin Molette",status:"tonight",tickets:""},
  {id:2,name:"Concert Lyon — Le Périscope",date:"2026-05-15",time:"20h30",venue:"Le Périscope",city:"Lyon, FR",status:"upcoming",tickets:""},
  {id:3,name:"Festival Été",date:"2026-07-10",time:"22h00",venue:"TBA",city:"France",status:"tba",tickets:""},
];

const POSTS = [
  {id:1,title:"CE SOIR À ST JULIEN !",body:"On se retrouve ce soir à 21h à la Brasserie du Pilat. Entrez tôt, ça va chauffer 🔥 170 BPM garantis.",date:"2026-04-18",type:"news",audience:"all",likes:47,liked:false},
  {id:2,title:"Nouveau son en ligne",body:"Notre dernier titre est disponible sur SoundCloud. Cheap, primitif, sauvage — comme d'hab.",date:"2026-04-10",type:"news",audience:"all",likes:82,liked:false},
  {id:3,title:"PHOTOS BACKSTAGE",body:"Accès exclusif aux coulisses de notre dernier concert. Merci pour votre soutien incroyable ✦",date:"2026-04-05",type:"exclusive",audience:"fans",likes:134,liked:false},
];

const EXCLUSIVE = [
  {id:1,title:"Photos backstage — Concert Mars 2026",desc:"20 photos exclusives depuis les coulisses",icon:"📷",locked:false},
  {id:2,title:"Demo inédite — Titre non sorti",desc:"Enregistrement home studio GarageBand 3",icon:"🎵",locked:false},
  {id:3,title:"Setlist complète 2026",desc:"La liste des morceaux de la tournée",icon:"📋",locked:false},
  {id:4,title:"Session vidéo privée",desc:"Répétition filmée — accès VIP uniquement",icon:"🎬",locked:true},
];

const PRESS_KIT = [
  {name:"Bio artiste 2026",size:"PDF · 245 KB",icon:"📄"},
  {name:"Photos HD (pack x10)",size:"ZIP · 48 MB",icon:"🖼️"},
  {name:"Logo ELECTROBOY80",size:"SVG + PNG",icon:"✦"},
  {name:"Rider technique",size:"PDF · 180 KB",icon:"🔊"},
  {name:"Dossier de presse",size:"PDF · 2.4 MB",icon:"📰"},
];

// ============ AUTH ============
function switchAuthTab(tab, el) {
  document.querySelectorAll('.auth-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-login').style.display = tab==='login'?'block':'none';
  document.getElementById('tab-register').style.display = tab==='register'?'block':'none';
}

function doLogin() {
  const email = document.getElementById('login-email').value;
  if(!email) { showToast('Email requis','error'); return; }
  const role = email.includes('partner') ? 'partner' : 'fan';
  quickLogin(role);
}

function quickLogin(role) {
  currentUser = {...DEMO_USERS[role]};
  launchApp();
}

function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const role = document.getElementById('reg-role').value;
  if(!name||!email) { showToast('Remplis tous les champs','error'); return; }
  currentUser = {name, email, role, avatar:name[0].toUpperCase(), joined:new Date().toISOString().split('T')[0], alerts:[], subs:[]};
  launchApp();
}

function launchApp() {
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('user-avatar').textContent = currentUser.avatar;
  document.getElementById('user-name').textContent = currentUser.name.split(' ')[0];
  const roleTag = document.getElementById('role-tag');
  if(currentUser.role==='partner') {
    roleTag.textContent='PARTENAIRE'; roleTag.className='role-tag role-partner';
  } else {
    roleTag.textContent='FAN'; roleTag.className='role-tag role-fan';
  }
  buildNav();
  renderPage('home');
}

function doLogout() {
  currentUser = null;
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('app').classList.remove('visible');
}

// ============ NAV ============
function buildNav() {
  const nav = document.getElementById('bottom-nav');
  const tabs = currentUser.role==='partner' ? [
    {id:'home',icon:'⬛',label:'Accueil'},
    {id:'events',icon:'◈',label:'Concerts'},
    {id:'partner',icon:'◆',label:'Espace Pro'},
    {id:'account',icon:'♦',label:'Mon Compte'},
  ] : [
    {id:'home',icon:'⬛',label:'Accueil'},
    {id:'events',icon:'◈',label:'Concerts'},
    {id:'exclusive',icon:'★',label:'Exclusif'},
    {id:'account',icon:'♦',label:'Mon Compte'},
  ];
  nav.innerHTML = tabs.map(t=>`
    <div class="nav-tab ${t.id===currentPage?'active':''}" onclick="renderPage('${t.id}')">
      <span class="nav-icon">${t.icon}</span>
      <span class="nav-label">${t.label}</span>
    </div>`).join('');
}

function renderPage(id) {
  currentPage = id;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const el = document.getElementById('p-'+id);
  if(el) el.classList.add('active');
  buildNav();
  if(id==='home') renderHome();
  if(id==='events') renderEvents();
  if(id==='exclusive') renderExclusive();
  if(id==='partner') renderPartner();
  if(id==='account') renderAccount();
}

// ============ HOME ============
function renderHome() {
  const tonight = EVENTS.find(e=>e.status==='tonight');
  let html = '';

  if(tonight) {
    html += `<div style="background:var(--yellow);color:var(--black);padding:18px 20px;margin-bottom:16px;position:relative;overflow:hidden">
      <div style="position:absolute;right:10px;top:50%;transform:translateY(-50%);font-family:'Anton',sans-serif;font-size:80px;opacity:0.1;line-height:1">CE SOIR</div>
      <div style="font-family:'VT323',monospace;font-size:13px;letter-spacing:4px;margin-bottom:4px">⚡ CE SOIR</div>
      <div style="font-family:'Anton',sans-serif;font-size:24px;letter-spacing:-1px">${tonight.name}</div>
      <div style="font-size:11px;letter-spacing:2px;opacity:0.7;margin-top:2px">${tonight.time} · ${tonight.city}</div>
      <button class="btn btn-sm" style="margin-top:12px;background:var(--black);border-color:var(--black);color:var(--yellow);width:auto" onclick="renderPage('events')">→ Infos concert</button>
    </div>`;
  }

  html += `<div style="font-family:'VT323',monospace;font-size:16px;letter-spacing:4px;color:var(--muted);margin-bottom:14px">// DERNIÈRES NOUVELLES</div>`;

  const visiblePosts = POSTS.filter(p=>p.audience==='all'||(p.audience==='fans'&&currentUser.role==='fan')||(p.audience==='partners'&&currentUser.role==='partner'));
  html += visiblePosts.map(p=>postCard(p)).join('');

  document.getElementById('p-home').innerHTML = `<div style="padding:24px">${html}</div>`;
  // re-attach reaction events
}

function postCard(p) {
  const isExclusive = p.audience==='fans'||p.audience==='partners';
  return `<div class="post-card" style="${isExclusive?'border-color:rgba(255,255,0,0.3)':''}">
    ${isExclusive?'<div style="font-family:\'VT323\',monospace;font-size:12px;letter-spacing:3px;color:var(--yellow);margin-bottom:8px">★ EXCLUSIF</div>':''}
    <div class="post-header">
      <div class="post-avatar">E</div>
      <div>
        <div style="font-size:12px;font-weight:700">ELECTROBOY 80</div>
        <div class="post-meta">${p.date}</div>
      </div>
    </div>
    <div style="font-family:'Anton',sans-serif;font-size:16px;margin-bottom:8px">${p.title}</div>
    <div class="post-body">${p.body}</div>
    <div class="post-reactions">
      <button class="reaction-btn ${p.liked?'active':''}" onclick="likePost(${p.id},this)">
        ♦ <span class="like-count">${p.likes}</span>
      </button>
      <button class="reaction-btn" onclick="showToast('Commentaire envoyé !','success')">◇ Commenter</button>
      <button class="reaction-btn" onclick="showToast('Partagé !','info')">↗ Partager</button>
    </div>
  </div>`;
}

function likePost(id, btn) {
  const post = POSTS.find(p=>p.id===id);
  if(!post) return;
  post.liked = !post.liked;
  post.likes += post.liked ? 1 : -1;
  btn.classList.toggle('active', post.liked);
  btn.querySelector('.like-count').textContent = post.likes;
}

function toggleAlert(el) {
  el.classList.toggle('on');
  showToast(el.classList.contains('on')?'Alerte activée ✓':'Alerte désactivée','info');

// ============ TOAST ============
function showToast(msg, type='info') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<span>${{success:'✓',error:'✕',info:'ℹ'}[type]}</span> ${msg}`;
  container.appendChild(toast);
  setTimeout(()=>{ toast.style.opacity='0'; toast.style.transition='opacity 0.3s'; setTimeout(()=>toast.remove(),300); }, 3000);
}
